<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Bouncing Cat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  background: #0a0a0b;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
#canvas {
  display: block;
  width: 100%;
  height: 100%;
  cursor: none;
}
#controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 8px 14px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  backdrop-filter: blur(8px);
  z-index: 10;
  opacity: 0;
  transition: opacity 0.3s;
  flex-wrap: wrap;
  justify-content: center;
}
#controls:hover { opacity: 1; }
#controls button {
  background: rgba(255,255,255,0.08);
  border: none;
  color: #fff;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
#controls button:hover { background: rgba(255,255,255,0.15); }
#controls input[type="range"] { width: 60px; }
#controls input[type="text"] { width: 36px; text-align:center; background:rgba(255,255,255,0.08); border:none; border-radius:6px; color:#fff; font-size:16px; padding:2px; }
#info {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-size: 12px;
  color: rgba(255,255,255,0.15);
  pointer-events: none;
  text-align: center;
}
.count-label {
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  min-width: 30px;
  text-align: center;
}
@media (max-width: 640px) {
  #controls { max-width: 94%; bottom: 10px; gap: 6px; }
}
</style>
</head>
<body>
<div id="info">move mouse for controls · double-click reset</div>
<canvas id="canvas"></canvas>
<div id="controls">
  <button id="toggleBtn">Pause</button>
  <button id="speedDown">−</button>
  <input type="range" id="speedSlider" min="0.5" max="5" step="0.5" value="2">
  <button id="speedUp">+</button>
  <input type="text" id="emojiInput" value="🐱">
  <button id="sizeDown">−</button>
  <input type="range" id="sizeSlider" min="16" max="80" step="2" value="36">
  <button id="sizeUp">+</button>
  <button id="trailToggle">Trail</button>
  <button id="resetBtn">Reset</button>
  <span class="count-label" id="countLabel">1</span>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let paused = false;
let showTrail = false;
let emoji = '🐱';
let baseSize = 36;
let maxCount = 500;

let balls = [];

function createBall(x, y, vx, vy, size) {
  return { x, y, vx, vy, size, emoji };
}

function addBall(x, y, vx, vy, size) {
  if (balls.length >= maxCount) return;
  balls.push(createBall(x, y, vx, vy, size));
}

function initBalls(count) {
  balls = [];
  const speed = parseFloat(document.getElementById('speedSlider').value) * 1.5;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * 2 * Math.PI;
    addBall(
      W / 2 + (Math.random() - 0.5) * 100,
      H / 2 + (Math.random() - 0.5) * 100,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      baseSize
    );
  }
}
initBalls(1);

function update() {
  if (paused) return;
  const speed = parseFloat(document.getElementById('speedSlider').value) * 1.5;
  const newBalls = [];
  for (const b of balls) {
    b.x += b.vx;
    b.y += b.vy;
    let hit = false;
    if (b.x - b.size / 2 < 0) { b.x = b.size / 2; b.vx = -b.vx; hit = true; }
    if (b.x + b.size / 2 > W) { b.x = W - b.size / 2; b.vx = -b.vx; hit = true; }
    if (b.y - b.size / 2 < 0) { b.y = b.size / 2; b.vy = -b.vy; hit = true; }
    if (b.y + b.size / 2 > H) { b.y = H - b.size / 2; b.vy = -b.vy; hit = true; }
    if (hit && balls.length < maxCount) {
      const angle = Math.random() * 2 * Math.PI;
      newBalls.push(createBall(b.x, b.y, Math.cos(angle) * speed, Math.sin(angle) * speed, baseSize));
    }
  }
  for (const nb of newBalls) balls.push(nb);
  document.getElementById('countLabel').textContent = balls.length;
}

function draw() {
  if (!showTrail) {
    ctx.clearRect(0, 0, W, H);
  } else {
    ctx.fillStyle = 'rgba(10,10,11,0.06)';
    ctx.fillRect(0, 0, W, H);
  }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const b of balls) {
    ctx.font = `${b.size}px sans-serif`;
    ctx.fillText(b.emoji, b.x, b.y);
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();

// ─── Controls ───
const $ = id => document.getElementById(id);

$('toggleBtn').onclick = () => { paused = !paused; $('toggleBtn').textContent = paused ? 'Play' : 'Pause'; };

const speedSlider = $('speedSlider');
speedSlider.oninput = () => {
  const s = parseFloat(speedSlider.value) * 1.5;
  for (const b of balls) {
    const a = Math.atan2(b.vy, b.vx);
    b.vx = Math.cos(a) * s;
    b.vy = Math.sin(a) * s;
  }
};
$('speedUp').onclick = () => speedSlider.value = Math.min(5, parseFloat(speedSlider.value) + 0.5);
$('speedDown').onclick = () => speedSlider.value = Math.max(0.5, parseFloat(speedSlider.value) - 0.5);

const sizeSlider = $('sizeSlider');
sizeSlider.oninput = () => {
  baseSize = parseInt(sizeSlider.value);
  for (const b of balls) b.size = baseSize;
};
$('sizeUp').onclick = () => sizeSlider.value = Math.min(80, parseInt(sizeSlider.value) + 2);
$('sizeDown').onclick = () => sizeSlider.value = Math.max(16, parseInt(sizeSlider.value) - 2);

$('emojiInput').oninput = () => {
  emoji = $('emojiInput').value || '🐱';
  for (const b of balls) b.emoji = emoji;
};

$('trailToggle').onclick = () => {
  showTrail = !showTrail;
  $('trailToggle').textContent = showTrail ? 'Trail ON' : 'Trail';
  if (!showTrail) ctx.clearRect(0, 0, W, H);
};

$('resetBtn').onclick = () => initBalls(1);

canvas.ondblclick = () => initBalls(1);

// Hide controls
let hideTimer;
document.onmousemove = () => {
  $('controls').style.opacity = '1';
  $('info').style.opacity = '0';
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => {
    if (!$('controls').matches(':hover')) $('controls').style.opacity = '0';
  }, 3000);
};
</script>
</body>
</html>
